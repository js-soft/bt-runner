name: Prepare Weekly Dependency Release
description: Check whether the main branch is ready for an automated dependency release.

inputs:
  github-token:
    description: Token used to read releases, compare commits, and inspect tags.
    required: true
  branch:
    description: Branch to inspect.
    required: false
    default: main

outputs:
  should_release:
    description: Whether a new GitHub release should be created.
    value: ${{ steps.prepare.outputs.should_release }}
  next_tag:
    description: The next patch tag to release.
    value: ${{ steps.prepare.outputs.next_tag }}

runs:
  using: composite
  steps:
    - name: Check dependency-only changes
      id: prepare
      uses: actions/github-script@v7
      env:
        RELEASE_BRANCH: ${{ inputs.branch }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { owner, repo } = context.repo;
          const branch = process.env.RELEASE_BRANCH;
          const botAuthorLogins = new Set(["renovate[bot]", "dependabot[bot]"]);
          const botAuthorNames = new Set(["renovate bot", "renovate[bot]", "dependabot[bot]", "dependabot"]);
          const botEmailFragments = [
            "renovate[bot]@users.noreply.github.com",
            "bot@renovateapp.com",
            "dependabot[bot]@users.noreply.github.com",
            "dependabot@github.com",
          ];

          core.setOutput("should_release", "false");

          const latestRelease = await github.rest.repos.getLatestRelease({ owner, repo }).catch((error) => {
            if (error.status === 404) {
              core.setFailed("No latest GitHub release found.");
              return undefined;
            }
            throw error;
          });
          if (!latestRelease) {
            return;
          }

          const latestTag = latestRelease.data.tag_name;
          const versionMatch = latestTag.match(/^(v?)(\d+)\.(\d+)\.(\d+)$/);
          if (!versionMatch) {
            core.setFailed(`Latest release tag "${latestTag}" is not a patch-version tag.`);
            return;
          }

          const commits = [];
          let comparison;
          const basehead = `${latestTag}...${branch}`;
          for await (const response of github.paginate.iterator(
            github.rest.repos.compareCommitsWithBasehead,
            {
              owner,
              repo,
              basehead,
              per_page: 100,
            },
          )) {
            comparison ??= response.data;
            commits.push(...response.data.commits);
          }

          if (!comparison) {
            core.setFailed(`Could not compare ${basehead}.`);
            return;
          }

          if (comparison.status !== "ahead" && comparison.status !== "identical") {
            core.setFailed(`The ${branch} branch is ${comparison.status} compared to ${latestTag}.`);
            return;
          }

          if (comparison.ahead_by === 0) {
            core.notice(`No commits found on ${branch} after ${latestTag}.`);
            return;
          }

          const isDependencyBotCommit = (commit) => {
            const login = commit.author?.login?.toLowerCase();
            if (login && botAuthorLogins.has(login)) {
              return true;
            }

            const authorName = commit.commit.author?.name?.toLowerCase();
            if (authorName && botAuthorNames.has(authorName)) {
              return true;
            }

            const authorEmail = commit.commit.author?.email?.toLowerCase();
            return Boolean(authorEmail && botEmailFragments.some((fragment) => authorEmail.includes(fragment)));
          };

          const nonDependencyBotCommits = commits.filter((commit) => !isDependencyBotCommit(commit));
          if (nonDependencyBotCommits.length > 0) {
            const commitList = nonDependencyBotCommits
              .slice(0, 10)
              .map((commit) => `- ${commit.sha.slice(0, 7)} ${commit.commit.message.split("\n")[0]}`)
              .join("\n");

            core.setFailed(
              [
                `Found ${nonDependencyBotCommits.length} commit(s) on ${branch} after ${latestTag} that were not authored by Renovate or Dependabot.`,
                commitList,
              ].join("\n"),
            );
            return;
          }

          const [, prefix, major, minor, patch] = versionMatch;
          const nextTag = `${prefix}${major}.${minor}.${Number(patch) + 1}`;

          try {
            await github.rest.git.getRef({ owner, repo, ref: `tags/${nextTag}` });
            core.setFailed(`Tag ${nextTag} already exists.`);
            return;
          } catch (error) {
            if (error.status !== 404) {
              throw error;
            }
          }

          if (core.isDebug()) {
            core.debug(`Compared ${basehead}: ${comparison.ahead_by} commits ahead.`);
          }

          core.notice(`Creating ${nextTag} from ${comparison.ahead_by} dependency-bot commit(s).`);
          core.setOutput("next_tag", nextTag);
          core.setOutput("should_release", "true");
